app = "content-pipeline-worker"
primary_region = "dfw"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  WORKER_PORT = "4000"
  CLIPBOT_HOME = "/data"
  CLIPBOT_OUTPUT_DIR = "/data/output"

# Persistent storage for clips/output
[mounts]
  source = "clipbot_data"
  destination = "/data"

[http_service]
  internal_port = 4000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = "shared-cpu-2x"
  memory = "1gb"
