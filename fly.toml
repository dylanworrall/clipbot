app = "content-pipeline-worker"
primary_region = "dfw"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  CLIPBOT_HOME = "/data"
  CLIPBOT_OUTPUT_DIR = "/data/output"
  CLIPBOT_CLI_ROOT = "/app"
  PORT = "3000"

# Persistent storage for clips/output + data stores
[mounts]
  source = "clipbot_data"
  destination = "/data"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = "shared-cpu-2x"
  memory = "2gb"
